<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Multiservicios Ortiz</title>
  <link rel="stylesheet" href="style.css" />
</head>
<body>
  <header>
    <h1>Multiservicios Ortiz</h1>
    <p>Cambio de dinero Chile ⇄ Bolivia</p>
  </header>

  <main>
    <section class="conversion">
      <h2>Calculadora de cambio</h2>
      <label for="clp">Peso chileno (CLP):</label>
      <input type="number" id="clp" placeholder="Ej: 100000" />
      <button onclick="convertirCLPaBOB()">Convertir a Boliviano (BOB)</button>
      <p id="resultado-clp"></p>

      <label for="bob">Boliviano (BOB):</label>
      <input type="number" id="bob" placeholder="Ej: 1250" />
      <button onclick="convertirBOPaCLP()">Convertir a Peso Chileno (CLP)</button>
      <p id="resultado-bob"></p>
    </section>

    <!-- Panel oculto de acceso y edición -->
    <section id="acceso" class="oculto">
      <input type="password" id="clave" placeholder="Ingresa tu clave" />
      <button onclick="verificarClave()">Entrar</button>
    </section>

    <section id="panel" class="oculto">
      <h3>Actualizar tipo de cambio</h3>
      <label for="nuevoCambio">Nuevo valor (CLP a BOB):</label>
      <input type="number" step="0.0001" id="nuevoCambio" />
      <button onclick="guardarNuevoCambio()">Guardar</button>
      <p id="cambioActual"></p>
    </section>
  </main>

  <script src="script.js"></script>
</body>
</html>
